name: papodevweb

services:
  mongodb:
    image: mongo:7
    container_name: papodevweb-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-root}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - papodevweb

  redis:
    image: redis:7-alpine
    container_name: papodevweb-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - papodevweb

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: papodevweb-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # painel de gerenciamento
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - papodevweb

  minio:
    image: minio/minio:latest
    container_name: papodevweb-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9003:9000"    # API S3
      - "9002:9001"    # console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - papodevweb

  # Cria o bucket inicial do MinIO assim que o serviço sobe.
  minio-init:
    image: minio/mc:latest
    container_name: papodevweb-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-papodevweb-media};
      mc anonymous set download local/${MINIO_BUCKET:-papodevweb-media};
      exit 0;
      "
    networks:
      - papodevweb

  # Servidor SMTP de desenvolvimento + caixa de entrada web (captura os e-mails).
  mailpit:
    image: axllent/mailpit:latest
    container_name: papodevweb-mailpit
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "1075:1025"    # SMTP (porta incomum para evitar conflito com outros projetos)
      - "8075:8025"    # console web da caixa de entrada
    networks:
      - papodevweb

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: papodevweb-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./certs:/certs:ro
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started
    # HTTPS local com certificado self-signed (ver `make certs`).
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --ssl-keyfile
      - /certs/key.pem
      - --ssl-certfile
      - /certs/cert.pem
    networks:
      - papodevweb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: papodevweb-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./certs:/certs:ro
    depends_on:
      - backend
    command: ["pnpm", "dev", "--host", "0.0.0.0"]
    networks:
      - papodevweb

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  papodevweb:
    driver: bridge
