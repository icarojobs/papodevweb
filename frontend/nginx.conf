# Nginx para SPA (React/Vite). O TLS é terminado no Traefik (HTTP interno).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Healthcheck do contêiner / Traefik.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Assets com hash no nome: cache agressivo e imutável.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback de SPA: qualquer rota cai no index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html nunca em cache (garante deploy imediato do novo bundle).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;
}
